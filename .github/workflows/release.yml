name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
          - name: darwin-amd64
            runner: macos-13
            artifact: darwin-amd64
          - name: darwin-arm64
            runner: macos-14
            artifact: darwin-arm64

    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller tuim.spec --noconfirm --clean

      - name: Rename artifact
        run: mv dist/tuim dist/tuim-${{ github.ref_name }}-${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: tuim-${{ matrix.artifact }}
          path: dist/tuim-${{ github.ref_name }}-${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
